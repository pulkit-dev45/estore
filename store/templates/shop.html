{% extends 'base.html' %}

{% block title %}Shop - BookStore{% endblock %}

{% block content %}
<div class="container-fluid mt-4">

<div class="row g-4">

<!-- LEFT : CATEGORIES -->
<div class="col-md-3 align-self-start" id="fi">
<h4 class="fw-bold mb-3">📚 Categories</h4>
<div class="list-group shadow-sm rounded">
{% for cat in categories %}
<a href="{% url 'category' cat.id %}"
   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center hover-cat">
{{ cat.name }}
<i class="fa-solid fa-angle-right"></i>
</a>
{% endfor %}
</div>
</div>


<!-- RIGHT : BOOKS -->
<div class="col-md-9">
<div class="row g-4">
{% for book in books %}
<div class="col-md-4">
<div class="card h-100 shadow-lg rounded-4 hover-card">
<img src="{{ book.image.url }}" class="card-img-top book-img" alt="{{ book.title }}">
<div class="card-body d-flex flex-column">
<h5 class="card-title fw-bold">{{ book.title }}</h5>
<p class="text-success fw-bold mb-3"><i class="fa-solid fa-indian-rupee-sign me-1"></i>{{ book.price }}</p>

<div class="mt-auto d-flex gap-2">
<a href="{% url 'book_detail' book.id %}" class="btn btn-info btn-sm w-50 shadow-sm">
<i class="fa-solid fa-book-open me-1"></i> Read More
</a>
<a href="{% url 'add_to_cart' book.id %}" class="btn btn-success btn-sm w-50 shadow-sm">
<i class="fa-solid fa-cart-plus me-1"></i> Add to Cart
</a>
</div>
</div>
</div>
</div>
{% endfor %}
</div>
</div>

</div>
</div>

<style>
    #fi{
    position: sticky;
    top: 90px;
}

.hover-cat:hover{
    background:#0b0e1a;
    color:#ffc107;
    transition:.3s;
}

.hover-card{
    transition: all .3s ease;
}
.hover-card:hover{
    transform: translateY(-5px);
    box-shadow:0 25px 50px rgba(0,0,0,.15);
}
.book-img{
    height:300px;
    object-fit:cover;
    border-top-left-radius:16px;
    border-top-right-radius:16px;
}
.btn{
    border-radius:8px;
    transition:.3s;
}
.btn:hover{
    transform: translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}
.hover-cat{
    transition:.3s;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.hover-cat:hover{
    background:#e9f5ff;
    transform:translateX(3px);
}
</style>

{% endblock %}
