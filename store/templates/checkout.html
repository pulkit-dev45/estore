{% extends 'base.html' %}

{% block title %}Checkout - BookStore{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">

<div class="row g-4">

<!-- LEFT : DELIVERY ADDRESS -->
<div class="col-md-7">
<div class="card p-4 shadow-lg rounded-4">
<h4 class="mb-4 fw-bold">📦 Delivery Address</h4>

<form method="POST">
{% csrf_token %}

<input type="text" name="name" class="form-control mb-3 shadow-sm" placeholder="Full Name" required>

<textarea name="address" class="form-control mb-3 shadow-sm" placeholder="Full Address" rows="3" required></textarea>

<div class="row">
<div class="col-md-6 mb-3">
<input type="text" name="city" class="form-control shadow-sm" placeholder="City" required>
</div>
<div class="col-md-6 mb-3">
<input type="text" name="pincode" class="form-control shadow-sm" placeholder="Pincode" required>
</div>
</div>

<input type="text" name="phone" class="form-control mb-3 shadow-sm" placeholder="Phone Number" required>

<button class="btn btn-success w-100 btn-lg shadow-sm">
<i class="fa-solid fa-truck me-2"></i>Place Order
</button>
</form>
</div>
</div>

<!-- RIGHT : ORDER SUMMARY -->
<div class="col-md-5">
<div class="card p-4 shadow-lg rounded-4">
<h4 class="mb-4 fw-bold">🧾 Order Summary</h4>

{% for book in books %}
<div class="d-flex justify-content-between align-items-center mb-2">
<div class="d-flex align-items-center">
<img src="{{ book.image.url }}" alt="{{ book.title }}" class="img-fluid rounded me-2" style="height:50px; width:40px; object-fit:cover; box-shadow:0 3px 10px rgba(0,0,0,.1);">
<span class="fw-semibold">{{ book.title }} (x{{ book.qty }})</span>
</div>
<span class="fw-bold text-success">₹ {{ book.subtotal }}</span>
</div>
<hr>
{% endfor %}

<h5 class="text-end mt-3 fw-bold">Total: <span class="text-success">₹ {{ total }}</span></h5>
</div>
</div>

</div>
</div>

<style>
.card{
    transition: all .3s ease;
}
.card:hover{
    transform: translateY(-5px);
    box-shadow:0 30px 60px rgba(0,0,0,.15);
}
input, textarea{
    border-radius:8px;
}
input:focus, textarea:focus{
    box-shadow: 0 0 8px rgba(25,135,84,.3) !important;
    border-color:#198754 !important;
}
.btn-success{
    font-size:17px;
    border-radius:10px;
    transition:.3s;
}
.btn-success:hover{
    transform: translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}
</style>
{% endblock %}
