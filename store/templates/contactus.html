{% extends 'base.html' %}

{% block title %}Contact Us - BookStore{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-lg rounded-4 p-4">
                <h2 class="text-center mb-4">📩 Contact Us</h2>
                <p class="text-center text-muted mb-4">We’d love to hear from you! Please fill out the form below.</p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" name="name" id="name" class="form-control" placeholder="Your Name" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" name="subject" id="subject" class="form-control" placeholder="Subject" required>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea name="message" id="message" rows="5" class="form-control" placeholder="Your Message" required></textarea>
                    </div>

                   <a href="{% url "home" %}"> <button type="button" class="btn btn-success w-100">
                        <i class="fa-solid fa-paper-plane me-2"></i> Send Message
                    </button>
                    </a>
                </form>
            </div>

            <div class="text-center mt-4 text-muted">
                <p>Or reach us at <a href="mailto:support@bookstore.com">support@bookstore.com</a> | 📞 +91 98765 43210</p>
            </div>

        </div>
    </div>
</div>

<style>
.card form input, .card form textarea{
    border-radius:8px;
    transition:.3s;
}
.card form input:focus, .card form textarea:focus{
    box-shadow:0 4px 15px rgba(25, 135, 84,.3);
    border-color:#198754;
}
.btn-success:hover{
    transform: translateY(-2px);
    box-shadow:0 8px 20px rgba(25,135,84,.3);
}
</style>
{% endblock %}
