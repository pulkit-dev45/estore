<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
<div class="card p-4 shadow-lg" style="width:420px">

<h3 class="text-center mb-3">🆕 Create Account</h3>

{% for msg in messages %}
<p class="text-danger text-center">{{ msg }}</p>
{% endfor %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
<input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
<input type="password" name="password1" class="form-control mb-3" placeholder="Password" required>
<input type="password" name="password2" class="form-control mb-3" placeholder="Confirm Password" required>

<button class="btn btn-success w-100">Signup</button>
</form>

<p class="text-center mt-3">
Already have an account?
<a href="{% url 'login' %}">Login</a>
</p>

</div>
</div>

</body>
</html>
